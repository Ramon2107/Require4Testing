# Require4Testing - Produktionskonfiguration
# ==========================================
# Diese Konfiguration überschreibt die Standardwerte für den Produktivbetrieb.
# WICHTIG: Alle sensiblen Daten MÜSSEN über Umgebungsvariablen gesetzt werden!

# =================================================
# MySQL Datenbank-Konfiguration (Produktion)
# =================================================
# SSL ist für Produktionsumgebungen aktiviert
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/require4testingdb?useSSL=true&serverTimezone=UTC&requireSSL=true}

# Anmeldedaten MÜSSEN über Umgebungsvariablen gesetzt werden
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# =================================================
# JPA/Hibernate Konfiguration (Produktion)
# =================================================
# validate: Schema wird nur validiert, nicht automatisch geändert
spring.jpa.hibernate.ddl-auto=validate
# SQL-Logging in Produktion deaktiviert
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =================================================
# SQL-Initialisierung (Produktion)
# =================================================
# In Produktion keine automatische Dateninitialisierung
spring.sql.init.mode=never

# =================================================
# Logging-Konfiguration (Produktion)
# =================================================
logging.level.org.springframework=WARN
logging.level.com.iu.require4testing=INFO

# =================================================
# Sicherheitseinstellungen (Produktion)
# =================================================
# Fehlerdetails nicht an Client senden
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
