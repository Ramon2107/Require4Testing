# Require4Testing Application Configuration
# Konfigurationsdatei für die Spring Boot Anwendung
# =================================================
# HINWEIS: Diese Standardkonfiguration ist für die ENTWICKLUNGSUMGEBUNG gedacht.
# Für den Produktiveinsatz verwenden Sie das Profil 'prod' oder setzen Sie
# entsprechende Umgebungsvariablen.

# Aktives Profil (dev = Entwicklung, prod = Produktion)
# Kann über Umgebungsvariable SPRING_PROFILES_ACTIVE überschrieben werden
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server-Konfiguration
server.port=8080

# =================================================
# MySQL Datenbank-Konfiguration
# =================================================
# SICHERHEITSHINWEISE für den Produktiveinsatz:
# 1. SSL aktivieren: useSSL=true
# 2. Dedizierten Datenbankbenutzer mit eingeschränkten Rechten verwenden
# 3. Passwort als Umgebungsvariable speichern: ${DB_PASSWORD}
# 4. allowPublicKeyRetrieval=false setzen wenn möglich

# Verbindungsparameter (Erläuterungen):
# - createDatabaseIfNotExist: Erstellt die Datenbank automatisch falls nicht vorhanden
# - useSSL: SSL-Verschlüsselung für die Datenbankverbindung (false nur für lokale Entwicklung!)
# - serverTimezone: Setzt die Zeitzone für die Verbindung
# - allowPublicKeyRetrieval: Ermöglicht Abruf des öffentlichen Schlüssels (nur für Entwicklung)

# Datenbankverbindung - Werte können über Umgebungsvariablen überschrieben werden
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/require4testingdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Datenbank-Anmeldedaten (für Produktion Umgebungsvariablen nutzen!)
# Beispiel: export DB_USERNAME=require4testing_user
#           export DB_PASSWORD=sicheresPasswort123!
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# =================================================
# JPA/Hibernate Konfiguration
# =================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ddl-auto: validate für Produktion, update für Entwicklung
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
# SQL-Logging nur in Entwicklung aktivieren
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# =================================================
# SQL-Initialisierung
# =================================================
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.jpa.defer-datasource-initialization=true

# =================================================
# Logging-Konfiguration
# =================================================
logging.level.org.springframework=${LOG_LEVEL_SPRING:INFO}
logging.level.com.iu.require4testing=${LOG_LEVEL_APP:DEBUG}
