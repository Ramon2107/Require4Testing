# Require4Testing Application Configuration
# Konfigurationsdatei für die Spring Boot Anwendung

# Server-Konfiguration
server.port=8080

# MySQL Datenbank-Konfiguration
# HINWEIS: Diese Konfiguration ist für die Entwicklungsumgebung gedacht.
# Für den Produktiveinsatz sollten Sie:
# - SSL aktivieren (useSSL=true)
# - Einen dedizierten Datenbankbenutzer mit eingeschränkten Rechten verwenden
# - Das Passwort als Umgebungsvariable oder in einem sicheren Vault speichern

# Verbindungsparameter:
# - createDatabaseIfNotExist: Erstellt die Datenbank automatisch falls nicht vorhanden
# - useSSL=false: SSL ist für lokale Entwicklung deaktiviert (in Produktion aktivieren!)
# - serverTimezone: Setzt die Zeitzone für die Verbindung
# - allowPublicKeyRetrieval: Ermöglicht den Abruf des öffentlichen Schlüssels für die Authentifizierung
spring.datasource.url=jdbc:mysql://localhost:3306/require4testingdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Entwicklungs-Anmeldedaten (für Produktion durch sichere Werte ersetzen)
spring.datasource.username=root
spring.datasource.password=

# JPA/Hibernate Konfiguration für MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL-Initialisierung
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.org.springframework=INFO
logging.level.com.iu.require4testing=DEBUG
