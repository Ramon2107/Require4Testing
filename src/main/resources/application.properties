# Require4Testing Application Configuration
# Konfigurationsdatei für die Spring Boot Anwendung

# Server-Konfiguration
server.port=8080

# H2 Datenbank-Konfiguration
spring.datasource.url=jdbc:h2:mem:require4testingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Konsole aktivieren
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Konfiguration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL-Initialisierung
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.org.springframework=INFO
logging.level.com.iu.require4testing=DEBUG
