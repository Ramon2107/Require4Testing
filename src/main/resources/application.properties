# Require4Testing Application Configuration
# =================================================

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=8080

# =================================================
# MariaDB Datenbank-Konfiguration
# =================================================
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/require4testingdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.driverClassName=${DB_DRIVER:org.mariadb.jdbc.Driver}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Ella3011}

# =================================================
# JPA/Hibernate - DER RESET KNOPF
# =================================================
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MariaDBDialect}

# 'create' = Bei jedem Start DB l—schen & neu anlegen (Clean Slate)
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =================================================
# Daten-Initialisierung
# =================================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# =================================================
# Logging
# =================================================
logging.level.org.springframework=INFO
logging.level.com.iu.require4testing=DEBUG