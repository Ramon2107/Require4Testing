# Require4Testing Application Configuration
# =================================================

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=8080

# =================================================
# MySQL Datenbank-Konfiguration
# =================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/require4testingdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
# Hier dein Passwort eintragen (falls nˆtig):
spring.datasource.password=${DB_PASSWORD:Ella3011}

# =================================================
# JPA/Hibernate - DER RESET KNOPF
# =================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 'create' = Bei jedem Start DB lˆschen & neu anlegen (Clean Slate)
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =================================================
# Daten-Initialisierung
# =================================================
# L‰dt die User/Requirements aus data_bkp.sql nach dem Reset neu
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# =================================================
# Logging
# =================================================
logging.level.org.springframework=INFO
logging.level.com.iu.require4testing=DEBUG