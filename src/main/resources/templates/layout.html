<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>Require4Testing</title>

    <!-- WebJars OHNE Versionsnummer (wird per webjars-locator-core aufgelöst) -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">

    <style>
        /* Brand-Logo im Header */
        .r4t-navbar-brand { gap: 10px; }
        .r4t-navbar-logo { width: 28px; height: 28px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center r4t-navbar-brand" href="/">
            <!-- Require4Testing Logo (SVG) -->
            <svg class="r4t-navbar-logo" viewBox="0 0 96 96" role="img" aria-label="Require4Testing Logo" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="r4tGradNav" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0" stop-color="#0d6efd"/>
                        <stop offset="1" stop-color="#20c997"/>
                    </linearGradient>
                </defs>
                <rect x="8" y="8" width="80" height="80" rx="18" fill="url(#r4tGradNav)"/>
                <path d="M28 58c0-10 8-18 18-18h18v10H46c-4 0-8 4-8 8v6H28v-6z" fill="#ffffff" opacity="0.95"/>
                <path d="M58 64V32h10v32H58z" fill="#ffffff" opacity="0.95"/>
                <text x="48" y="82" text-anchor="middle" font-size="10" font-family="Arial, sans-serif" fill="#ffffff" opacity="0.9">
                    R4T
                </text>
            </svg>
            Require4Testing
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarText"
                aria-controls="navbarText"
                aria-expanded="false"
                aria-label="Navigation öffnen">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/ui/requirements">Anforderungen</a></li>
                <li class="nav-item"><a class="nav-link" href="/ui/testruns">Testläufe</a></li>
            </ul>

            <div class="d-flex text-white align-items-center">
                <span th:if="${session.currentUser != null}" class="me-3 d-flex align-items-center">
                    <i class="bi bi-person-circle me-2"></i>
                    <span th:text="${session.currentUser.username}" class="fw-bold">User</span>

                    <span class="badge bg-light text-dark ms-2" th:switch="${session.currentUser.role}">
                        <span th:case="'ADMIN'">Admin</span>
                        <span th:case="'MANAGER'">Testmanager</span>
                        <span th:case="'CREATOR'">Testfallersteller</span>
                        <span th:case="'REQUIREMENT_ENGINEER'">Requirements Engineer</span>
                        <span th:case="'TESTER'">Tester</span>
                        <span th:case="*">Benutzer</span>
                    </span>
                </span>
                <a th:if="${session.currentUser != null}" href="/logout" class="btn btn-sm btn-outline-light ms-3">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Schließen"></button>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}">Success</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Schließen"></button>
    </div>

    <div th:replace="${content}"></div>
</div>

<!-- WebJars OHNE Versionsnummer -->
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
