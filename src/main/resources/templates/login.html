<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Require4Testing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; display: flex; align-items: center; padding-top: 40px; padding-bottom: 40px; min-height: 100vh; }
        .form-signin { width: 100%; max-width: 400px; padding: 15px; margin: auto; }
    </style>
</head>
<body>
<main class="form-signin text-center">
    <form action="/login" method="post">
        <h1 class="h3 mb-3 fw-normal">Bitte anmelden</h1>
        <p class="text-muted">Wählen Sie einen Benutzer (Demo-Modus)</p>

        <div class="form-floating mb-3">
            <select name="userId" class="form-select" id="floatingSelect" required>
                <option value="" selected disabled>Benutzer wählen...</option>
                <option th:each="u : ${users}" th:value="${u.id}">
                    <!-- Anzeige: Name (Deutsche Rolle) -->
                    <span th:text="${u.username}">User</span>
                    (
                    <span th:if="${u.role == 'ADMIN'}">Admin</span>
                    <span th:if="${u.role == 'MANAGER'}">Testmanager</span>
                    <span th:if="${u.role == 'CREATOR'}">Testfallersteller</span>
                    <span th:if="${u.role == 'REQUIREMENT_ENGINEER'}">Requirements Engineer</span>
                    <span th:if="${u.role == 'TESTER'}">Tester</span>
                    )
                </option>
            </select>
            <label for="floatingSelect">Benutzer</label>
        </div>

        <button class="w-100 btn btn-lg btn-primary" type="submit">Anmelden</button>
        <p class="mt-5 mb-3 text-muted">&copy; Require4Testing</p>
    </form>
</main>
</body>
</html>
