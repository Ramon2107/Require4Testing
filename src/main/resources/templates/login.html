<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Require4Testing</title>

    <!-- WebJars OHNE Versionsnummer (wird per webjars-locator-core aufgelöst) -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">

    <style>
        body { background-color: #f5f5f5; display: flex; align-items: center; padding-top: 40px; padding-bottom: 40px; min-height: 100vh; }
        .form-signin { width: 100%; max-width: 400px; padding: 15px; margin: auto; }

        .r4t-brand { display: inline-flex; align-items: center; gap: 10px; }
        .r4t-logo { width: 36px; height: 36px; }
        .r4t-brand-title { font-size: 1.25rem; font-weight: 700; margin: 0; line-height: 1; }
    </style>
</head>
<body>
<main class="form-signin text-center">
    <form action="/login" method="post">

        <div class="mb-3 d-flex justify-content-center">
            <div class="r4t-brand" aria-label="Require4Testing">
                <svg class="r4t-logo" viewBox="0 0 96 96" role="img" aria-label="Require4Testing Logo" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="r4tGrad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="#0d6efd"/>
                            <stop offset="1" stop-color="#20c997"/>
                        </linearGradient>
                    </defs>
                    <rect x="8" y="8" width="80" height="80" rx="18" fill="url(#r4tGrad)"/>
                    <path d="M28 58c0-10 8-18 18-18h18v10H46c-4 0-8 4-8 8v6H28v-6z" fill="#ffffff" opacity="0.95"/>
                    <path d="M58 64V32h10v32H58z" fill="#ffffff" opacity="0.95"/>
                    <text x="48" y="82" text-anchor="middle" font-size="10" font-family="Arial, sans-serif" fill="#ffffff" opacity="0.9">
                        R4T
                    </text>
                </svg>
                <div class="text-start">
                    <p class="r4t-brand-title">Require4Testing</p>
                    <small class="text-muted">Bitte anmelden (Demo-Modus)</small>
                </div>
            </div>
        </div>

        <div class="form-floating mb-3">
            <select name="userId" class="form-select" id="floatingSelect" required aria-label="Benutzer auswählen">
                <option value="" selected disabled>Benutzer wählen...</option>
                <option th:each="u : ${users}"
                        th:value="${u.id}"
                        th:text="${u.username
                            + ' ('
                            + (u.role == 'ADMIN' ? 'Admin'
                            : u.role == 'MANAGER' ? 'Testmanager'
                            : u.role == 'CREATOR' ? 'Testfallersteller'
                            : u.role == 'REQUIREMENT_ENGINEER' ? 'Requirements Engineer'
                            : u.role == 'TESTER' ? 'Tester'
                            : 'Benutzer')
                            + ')'}">
                    User (Rolle)
                </option>
            </select>
            <label for="floatingSelect">Benutzer</label>
        </div>

        <button class="w-100 btn btn-lg btn-primary" type="submit">Anmelden</button>
        <p class="mt-5 mb-3 text-muted">&copy; Require4Testing</p>
    </form>
</main>
</body>
</html>
