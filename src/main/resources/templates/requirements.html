<!DOCTYPE html>
<!--
  Übersichtsseite für Anforderungen.
  Zeigt dynamische Status basierend auf Testläufen.

  @module Templates
  @author Require4Testing Team
-->
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::content})}">
    <!-- Hinweis: Defaults für IDE, beeinflusst Runtime nicht. -->
    <!--/*@thymesVar id="requirements" type="java.util.List<com.iu.require4testing.entity.Requirement>"*/-->
    <!--/*@thymesVar id="newRequirement" type="com.iu.require4testing.entity.Requirement"*/-->
    <div th:fragment="content" th:with="requirements=${requirements}, newRequirement=${newRequirement}">
        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Anforderungskatalog</span>
                <button type="button" class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#newReqModal">
                    Neu
                </button>
            </div>
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Titel</th>
                        <th>Status</th>
                        <th>Erstellt am</th>
                        <th>Aktion</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!--/*@thymesVar id="req" type="com.iu.require4testing.entity.Requirement"*/-->
                    <tr th:each="req : ${requirements}">
                        <td><span class="badge bg-light text-dark border" th:text="${req.readableId != null ? req.readableId : req.id}">REQ-001</span></td>
                        <td th:text="${req.name}">Login</td>
                        <td>
                            <span th:if="${req.status == 'SUCCESSFUL'}" class="badge bg-success">SUCCESSFUL</span>
                            <span th:if="${req.status == 'FAILED'}" class="badge bg-danger">FAILED</span>
                            <span th:if="${req.status == 'IN_PROGRESS'}" class="badge bg-warning text-dark">IN PROGRESS</span>
                            <span th:if="${req.status == 'PLANNING'}" class="badge bg-secondary">PLANNING</span>

                            <!-- Fallback (alte Daten) -->
                            <span th:if="${req.status == 'PLANNED'}" class="badge bg-secondary">PLANNING</span>

                            <span th:if="${req.status != 'SUCCESSFUL' and req.status != 'FAILED' and req.status != 'IN_PROGRESS' and req.status != 'PLANNING' and req.status != 'PLANNED'}"
                                  class="badge bg-light text-dark border" th:text="${req.status}">STATUS</span>
                        </td>
                        <td th:text="${#temporals.format(req.createdAt, 'dd.MM.yyyy')}">01.01.2025</td>
                        <td>
                            <a th:href="@{/ui/requirements/{id}(id=${req.id})}" class="btn btn-sm btn-outline-primary">Details</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal für neue Anforderung -->
        <div class="modal fade" id="newReqModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Neue Anforderung</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
                    </div>
                    <div class="modal-body">
                        <form th:action="@{/ui/requirements}" th:object="${newRequirement}" method="post">
                            <div class="mb-3">
                                <label class="form-label" for="reqName">Titel</label>
                                <input id="reqName" type="text" class="form-control" th:field="*{name}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="reqDescription">Beschreibung</label>
                                <textarea id="reqDescription" class="form-control" th:field="*{description}" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Speichern</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
